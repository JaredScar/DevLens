<div class="notes">
  <div class="notes__scroll sw__body">
    <div class="sw__page-header">
      <i class="fa-solid fa-note-sticky sw__page-icon" aria-hidden="true"></i>
      <div>
        <h2 class="sw__page-title">Notes</h2>
        <p class="sw__page-desc">Workspace notes with simple markdown (**bold**, `code`, links).</p>
      </div>
    </div>

    <input
      class="sw__input"
      type="search"
      placeholder="Search notes…"
      [ngModel]="filter()"
      (ngModelChange)="filter.set($event)"
      aria-label="Search notes"
    />

    <div class="sw__card">
      <div class="sw__card-header">Compose</div>
      <div class="sw__card-body">
        <input
          class="sw__input"
          type="text"
          placeholder="Title"
          [ngModel]="draftTitle()"
          (ngModelChange)="draftTitle.set($event)"
        />
        <textarea
          class="sw__textarea notes__compose-md"
          rows="3"
          placeholder="Write a note… (**bold**, `code`, [link](https://…))"
          [ngModel]="draftBody()"
          (ngModelChange)="draftBody.set($event)"
        ></textarea>
        <input
          class="sw__input"
          type="url"
          placeholder="Link (optional)"
          [ngModel]="draftUrl()"
          (ngModelChange)="draftUrl.set($event)"
        />
        <div class="notes__compose-actions">
          @if (editingId()) {
            <button type="button" class="sw__btn" (click)="cancelCompose()">Cancel</button>
          }
          <button type="button" class="sw__btn sw__btn--primary" (click)="saveNote()">
            {{ editingId() ? 'Update note' : 'Add note' }}
          </button>
        </div>
      </div>
    </div>

    <ul class="notes__list sw__list">
      @for (n of filtered(); track n.id) {
        <li
          class="notes__card sw__list-card"
          [attr.data-note-card]="n.id"
          [class.notes__card--flash]="flashNoteId() === n.id"
        >
          <div class="notes__card-body">
            <strong class="notes__card-title">{{ n.title }}</strong>
            @if (n.url) {
              <a class="notes__card-link" [href]="n.url" target="_blank" rel="noopener noreferrer">
                {{ n.url }}
              </a>
            }
            @if (n.body) {
              <div class="notes__card-md" [innerHTML]="previewHtml(n)"></div>
            }
            @if (n.updatedAt) {
              <span class="notes__card-date">{{ n.updatedAt | date: 'M/d/yyyy' }}</span>
            }
          </div>
          <div class="notes__card-actions">
            <button type="button" class="sw__icon-btn" title="Edit" (click)="startEdit(n)">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 2l2 2-7 7H2v-2z" />
              </svg>
            </button>
            <button type="button" class="sw__icon-btn" title="Delete" (click)="notes.remove(n.id)">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M2 2l8 8M10 2l-8 8" />
              </svg>
            </button>
          </div>
        </li>
      }
    </ul>
  </div>
</div>
