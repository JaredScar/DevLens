<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DevLens</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
    Electron CSP for the Angular shell (guest pages in <webview> use separate policies).
    Tighten further when dev no longer needs connect-src to the Vite/ng serve origin.
  -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:* wss://127.0.0.1:* https: http:;"
    />
    <link rel="icon" type="image/png" href="icon.png" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
