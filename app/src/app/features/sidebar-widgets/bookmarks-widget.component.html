<div class="sw">
  <h3 class="sw__title">Bookmarks</h3>
  @if (bookmarks().length === 0) {
    <p class="sw__empty">No bookmarks yet. Star a page from the toolbar to add one.</p>
  } @else {
    <ul class="sw__list">
      @for (b of bookmarks(); track b.id) {
        <li class="sw__card">
          @if (editingId() === b.id) {
            <div class="sw__edit">
              <input
                class="sw__edit-input"
                type="text"
                placeholder="Title"
                [ngModel]="editTitle()"
                (ngModelChange)="editTitle.set($event)"
              />
              <input
                class="sw__edit-input"
                type="url"
                placeholder="URL"
                [ngModel]="editUrl()"
                (ngModelChange)="editUrl.set($event)"
              />
              <div class="sw__edit-actions">
                <button type="button" class="sw__edit-btn" (click)="cancelEdit()">Cancel</button>
                <button
                  type="button"
                  class="sw__edit-btn sw__edit-btn--primary"
                  (click)="saveEdit()"
                >
                  Save
                </button>
              </div>
            </div>
          } @else {
            <div class="sw__row">
              <button type="button" class="sw__link" (click)="open(b.url, b.title)">
                {{ b.title || b.url }}
                <span class="sw__muted">{{ b.url }}</span>
              </button>
              <button type="button" class="sw__icon-btn" title="Edit" (click)="startEdit(b)">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M9 2l2 2-7 7H2v-2z" />
                </svg>
              </button>
              <button type="button" class="sw__icon-btn" title="Remove" (click)="remove(b.id)">
                ×
              </button>
            </div>
          }
        </li>
      }
    </ul>
  }
</div>
